<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>GymOS v8.6.2 — Training Day Jump</title>
<style>
:root {
  --bg:#0b0f14; --panel:#121821; --panel2:#171f2b; --muted:#92a0b4; --muted2:#6b7788;
  --text:#eef4ff; --line:#253140; --accent:#4fd5a8; --accent2:#6da7ff; --warn:#ffbf47; --danger:#ff6d7a;
  --radius:20px; --radius-sm:14px; --shadow:0 14px 36px rgba(0,0,0,.38);
  --safe-b: env(safe-area-inset-bottom, 0px);
}
body[data-theme="light"] {
  --bg:#f4f7fb; --panel:#ffffff; --panel2:#eef3fa; --muted:#506074; --muted2:#6f8093;
  --text:#152131; --line:#d6e0eb; --accent:#179b74; --accent2:#316edb; --warn:#b77900; --danger:#cf3048;
  --shadow:0 14px 36px rgba(21,33,49,.08);
}
* { box-sizing:border-box; }
html,body { height:100%; margin:0; }
body {
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background:
    radial-gradient(1200px 600px at 10% -10%, rgba(79,213,168,.12), transparent 40%),
    radial-gradient(900px 500px at 100% 0%, rgba(109,167,255,.12), transparent 35%),
    var(--bg);
  color:var(--text);
}
button, input, select, textarea { font:inherit; }
button { cursor:pointer; }
.app { min-height:100%; max-width:520px; margin:0 auto; padding:16px 16px calc(84px + var(--safe-b)); }
.screen { display:none; }
.screen.active { display:block; }
.top {
  position:sticky; top:0; z-index:15; padding:8px 0 14px;
  background:linear-gradient(180deg, rgba(11,15,20,.95), rgba(11,15,20,.82) 70%, rgba(11,15,20,0));
  backdrop-filter: blur(12px);
}
.brand {
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  margin-bottom:12px;
}
.logoWrap { display:flex; gap:12px; align-items:center; }
.logo {
  width:44px; height:44px; border-radius:14px; border:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 30% 30%, rgba(79,213,168,.95), transparent 52%),
    radial-gradient(circle at 70% 70%, rgba(109,167,255,.95), transparent 48%),
    linear-gradient(145deg, rgba(255,255,255,.12), rgba(255,255,255,.03));
  box-shadow: var(--shadow);
}
.title h1 { margin:0; font-size:18px; line-height:1.1; }
.title p { margin:4px 0 0; color:var(--muted); font-size:12px; }
.iconBtn {
  border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--text);
  width:42px; height:42px; border-radius:14px;
}
.hero {
  background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
  border:1px solid var(--line); border-radius:24px; padding:16px; box-shadow: var(--shadow);
}
.badgeRow { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
.badge {
  font-size:11px; color:var(--muted); border:1px solid var(--line); border-radius:999px; padding:8px 10px;
  background:rgba(255,255,255,.03);
}
.badge.good { color:var(--accent); border-color:rgba(79,213,168,.26); }
.badge.blue { color:var(--accent2); border-color:rgba(109,167,255,.24); }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.card {
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
  border:1px solid var(--line); border-radius:20px; padding:14px; box-shadow: var(--shadow);
}
.card h2,.card h3,.card h4 { margin:0 0 10px; }
.card h2 { font-size:16px; }
.card h3 { font-size:14px; }
.card h4 { font-size:13px; color:var(--muted); }
.section { margin-top:14px; }
.kv { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.kv .slot, .chipInput {
  border:1px solid var(--line); border-radius:16px; background:rgba(255,255,255,.03); padding:10px 12px;
}
.slot label, .chipInput label { display:block; color:var(--muted); font-size:11px; margin-bottom:6px; }
.slot .v { font-size:18px; font-weight:700; }
select, input[type="number"], input[type="text"], textarea {
  width:100%; border:none; outline:none; background:transparent; color:var(--text);
}
.row { display:flex; gap:10px; align-items:center; }
.row.between { justify-content:space-between; }
.btn {
  border:none; border-radius:16px; padding:12px 14px; color:var(--text);
  background:rgba(255,255,255,.06); border:1px solid var(--line); font-weight:700;
}
.btn.primary { background:linear-gradient(180deg, rgba(79,213,168,.22), rgba(79,213,168,.12)); border-color:rgba(79,213,168,.3); color:#eafef7; }
.btn.secondary { background:linear-gradient(180deg, rgba(109,167,255,.2), rgba(109,167,255,.1)); border-color:rgba(109,167,255,.28); }
.btn.ghost { background:transparent; }
.list { display:flex; flex-direction:column; gap:10px; }
.dayCard {
  border:1px solid var(--line); border-radius:18px; padding:14px; background:rgba(255,255,255,.03);
}
.dayCard.active { border-color:rgba(109,167,255,.3); background:rgba(109,167,255,.08); }
.small { font-size:12px; color:var(--muted); }
.exercise {
  border:1px solid var(--line); border-radius:18px; overflow:hidden; background:rgba(255,255,255,.03);
}
.exHead { padding:14px; display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
.exBody { padding:0 14px 14px; display:grid; gap:12px; }
.exName { font-size:15px; font-weight:750; line-height:1.2; }
.exTags { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
.tag { font-size:11px; padding:6px 8px; border-radius:999px; border:1px solid var(--line); color:var(--muted); }
.tag.good { border-color:rgba(79,213,168,.25); color:var(--accent); }
.tag.blue { border-color:rgba(109,167,255,.26); color:var(--accent2); }
.tag.warn { border-color:rgba(255,191,71,.26); color:var(--warn); }
.cols {
  display:grid; grid-template-columns:repeat(2,1fr); gap:10px;
}
.miniGrid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.note {
  min-height:72px; border:1px solid var(--line); border-radius:14px; padding:10px 12px; background:rgba(255,255,255,.03);
}
.toolbar { display:flex; gap:10px; flex-wrap:wrap; }
.progressBar {
  height:10px; border-radius:999px; overflow:hidden; border:1px solid var(--line); background:rgba(255,255,255,.04);
}
.progressBar > span {
  display:block; height:100%; background:linear-gradient(90deg, var(--accent), var(--accent2));
}
.bottomNav {
  position:fixed; left:0; right:0; bottom:0; z-index:20; display:flex; justify-content:center;
  padding:10px 12px calc(10px + var(--safe-b));
  background:linear-gradient(180deg, rgba(11,15,20,0), rgba(11,15,20,.95) 30%);
}
.navShell {
  width:min(520px, calc(100vw - 24px)); display:grid; grid-template-columns:repeat(7,1fr); gap:8px;
  border:1px solid var(--line); border-radius:22px; padding:8px; background:rgba(18,24,33,.92); backdrop-filter: blur(14px);
  box-shadow: var(--shadow);
}
.navBtn {
  border:none; background:transparent; color:var(--muted); padding:10px 6px; border-radius:16px; font-size:11px; font-weight:700;
}
.navBtn.active { background:rgba(109,167,255,.14); color:var(--text); }
table { width:100%; border-collapse:collapse; }
th,td { padding:10px 8px; border-bottom:1px solid rgba(255,255,255,.06); font-size:12px; text-align:left; }
th { color:var(--muted); font-weight:700; }
.toast {
  position:fixed; left:50%; transform:translateX(-50%); bottom:96px; z-index:30;
  background:rgba(18,24,33,.98); border:1px solid var(--line); border-radius:999px; padding:10px 14px; color:var(--text);
  box-shadow: var(--shadow); opacity:0; pointer-events:none; transition:.18s ease;
}
.toast.show { opacity:1; }
.divider { height:1px; background:rgba(255,255,255,.06); margin:10px 0; }
.quickActions { display:flex; gap:10px; overflow:auto; padding-bottom:2px; }
.quickActions .btn { white-space:nowrap; }

.statGrid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.chartList { display:flex; flex-direction:column; gap:12px; }
.barRow { display:grid; grid-template-columns:72px 1fr 52px; gap:10px; align-items:center; }
.pill { display:inline-flex; align-items:center; gap:6px; font-size:11px; padding:6px 10px; border-radius:999px; border:1px solid var(--line); background:rgba(255,255,255,.03); color:var(--muted); }
.callout { border:1px dashed rgba(255,255,255,.14); border-radius:16px; padding:12px; background:rgba(255,255,255,.025); }


html, body { overflow-x:hidden; overscroll-behavior-y:contain; }
body { -webkit-overflow-scrolling:touch; }
.card, .exercise, .dayCard, .chipInput, .slot { min-width:0; }
.exHead { flex-wrap:wrap; }
.exHead > * { min-width:0; }
.exName, .small, .tag, label, .chipInput label { word-break:break-word; }
.chipInput input, .chipInput select, .chipInput textarea { min-width:0; }
.toolbar { flex-wrap:wrap; }
.toolbar .btn { flex:1 1 120px; min-width:0; }
@media (max-width: 560px) {
  .app { padding-left:12px; padding-right:12px; }
  .grid2, .kv, .cols, .miniGrid, .statGrid3 { grid-template-columns:1fr; }
  .barRow { grid-template-columns:64px 1fr 48px; }
  .row { flex-wrap:wrap; }
  .row > * { min-width:0; }
  .brand { align-items:flex-start; }
  .logoWrap { align-items:flex-start; }
  .title { min-width:0; }
  .title h1 { font-size:16px; }
  .title p { font-size:11px; }
  .navShell { width:calc(100vw - 16px); gap:4px; padding:6px; }
  .navBtn { padding:10px 4px; font-size:10px; }
  .exBody { gap:10px; }
  .chipInput { padding:10px; }
  .quickActions { padding-bottom:6px; }
}

@media (min-width:760px) {
  .app { max-width:980px; }
  .desktopGrid { display:grid; grid-template-columns:1.08fr .92fr; gap:14px; }
  .bottomNav { justify-content:flex-end; right:18px; left:auto; }
  .navShell { width:360px; }
}

.dayJumpBar { position:sticky; top:74px; z-index:12; margin-top:10px; }
.dayJumpBar .card { padding:10px; }
.jumpScroller { display:flex; gap:8px; overflow:auto; padding-bottom:2px; scroll-snap-type:x proximity; }
.jumpChip { white-space:nowrap; scroll-snap-align:start; }
.dayBodyCollapsed { display:none; }
.daySummaryActions { display:flex; gap:8px; flex-wrap:wrap; }
@media (max-width:560px) { .dayJumpBar { top:68px; } }

</style>
</head>

function weekLoggedLoad(week, dayId, idx) {
  const slot = state.logs?.[week]?.[dayId]?.[idx];
  const val = Number(slot?.todayLoad || slot?.startLoad || slot?.nextTarget || 0);
  return isFinite(val) && val > 0 ? val : 0;
}
function transitionFactorForWeek(targetWeek, exType) {
  const wt = effectiveWeekType(targetWeek).type;
  const phys = weekTypePhysiology(wt, exType);
  return (1 + phaseAwareIncrement(exType, phaseFromWeek(targetWeek))) * (phys.loadBias || 1);
}
function expectedLoadMap(day, ex, idx) {
  const step = state.unit === 'kg' ? 0.25 : 0.5;
  const records = {};
  for (let w = 1; w <= 12; w++) {
    const actual = weekLoggedLoad(w, day.id, idx);
    if (actual) records[w] = actual;
  }
  const liveSlot = getLogSlot(state.week, day.id, idx);
  const liveSeed = Number(liveSlot.todayLoad || liveSlot.startLoad || liveSlot.nextTarget || 0);
  let anchorWeek = Object.keys(records).length ? Math.min(...Object.keys(records).map(Number)) : state.week;
  let anchorLoad = records[anchorWeek] || (liveSeed > 0 ? liveSeed : 0);
  if (!anchorLoad) return {};
  if (!records[anchorWeek] && liveSeed > 0) anchorWeek = state.week;
  const map = { [anchorWeek]: roundToStep(anchorLoad, step) };
  for (let w = anchorWeek - 1; w >= 1; w--) {
    if (records[w]) { map[w] = roundToStep(records[w], step); continue; }
    const nextVal = map[w + 1] || records[w + 1];
    map[w] = nextVal ? roundToStep(nextVal / transitionFactorForWeek(w + 1, ex[1]), step) : '';
  }
  for (let w = anchorWeek + 1; w <= 12; w++) {
    if (records[w]) { map[w] = roundToStep(records[w], step); continue; }
    const prevVal = records[w - 1] || map[w - 1];
    map[w] = prevVal ? roundToStep(prevVal * transitionFactorForWeek(w, ex[1]), step) : '';
  }
  // ensure actual weeks become anchors for the next forecast segment
  for (let w = 2; w <= 12; w++) {
    if (records[w]) { map[w] = roundToStep(records[w], step); continue; }
    const prevVal = records[w - 1] || map[w - 1];
    if (prevVal) map[w] = roundToStep(prevVal * transitionFactorForWeek(w, ex[1]), step);
  }
  return map;
}
function expectedLoadForWeek(week, day, ex, idx) {
  const map = expectedLoadMap(day, ex, idx);
  return map[week] || '';
}
function roadmapBadges(day, ex, idx) {
  const map = expectedLoadMap(day, ex, idx);
  return Array.from({length:12}, (_,i) => {
    const w = i + 1;
    const val = map[w];
    const wt = effectiveWeekType(w).label;
    return `<span class="tag ${w===state.week?'blue':''}">W${w}: ${val || '—'} <span class="small">${wt}</span></span>`;
  }).join('');
}


function loadStatusFromRatio(ratio) {
  if (ratio >= 1.035) return { label: "Ahead", cls: "good" };
  if (ratio >= 0.97) return { label: "On track", cls: "blue" };
  return { label: "Behind", cls: "warn" };
}
function currentVsExpected(day, ex, idx, week=state.week) {
  const expected = Number(expectedLoadForWeek(week, day, ex, idx) || 0);
  const slot = getLogSlot(week, day.id, idx);
  const actual = Number(slot.todayLoad || slot.nextTarget || slot.startLoad || 0);
  if (!expected || !actual) return { expected, actual, ratio: 1, delta: 0, status: { label: 'No signal', cls: '' } };
  const ratio = actual / expected;
  return { expected, actual, ratio, delta: roundToStep(actual - expected, state.unit === 'kg' ? 0.25 : 0.5), status: loadStatusFromRatio(ratio) };
}
function recentPerformanceTrend(day, ex, idx, uptoWeek=state.week) {
  const pts = [];
  for (let w = Math.max(1, uptoWeek - 2); w <= uptoWeek; w++) {
    const cmp = currentVsExpected(day, ex, idx, w);
    if (cmp.expected && cmp.actual) pts.push(cmp.ratio);
  }
  if (!pts.length) return { avgRatio: 1, label: 'No trend' };
  const avgRatio = pts.reduce((a,b)=>a+b,0) / pts.length;
  return { avgRatio, label: avgRatio >= 1.03 ? 'Running hot' : avgRatio >= 0.97 ? 'Stable' : 'Lagging' };
}
function progressionAggressiveness(day, ex, idx, week=state.week) {
  const cmp = currentVsExpected(day, ex, idx, week);
  const trend = recentPerformanceTrend(day, ex, idx, week);
  const wt = effectiveWeekType(week).type;
  if (!cmp.expected || !cmp.actual) return { label: 'Base progression', note: 'Not enough logged load yet. Follow the standard phase and week-type rules.', factor: 1 };
  if (wt.includes('deload')) return { label: 'Protective', note: 'Deload logic is active. Keep progression conservative and prioritize technique quality.', factor: 0.5 };
  if (cmp.ratio >= 1.05 && trend.avgRatio >= 1.02) return { label: 'Aggressive', note: 'You are beating expected loads. Small extra jumps are justified if reps stay clean.', factor: 1.25 };
  if (cmp.ratio < 0.95 || trend.avgRatio < 0.97) return { label: 'Conservative', note: 'You are behind the forecast. Hold or trim jumps until execution stabilizes.', factor: 0.8 };
  if (wt === 'refeed') return { label: 'Performance-biased', note: 'Refeed week supports a modest push in reps or load without forcing sloppy grinding.', factor: 1.1 };
  return { label: 'Standard', note: 'Stay with the default jump size for this lift and phase.', factor: 1 };
}
function expectedLoadInsights(week=state.week) {
  const items = [];
  PROGRAM.forEach(day => day.exercises.forEach((ex, idx) => {
    const cmp = currentVsExpected(day, ex, idx, week);
    const trend = recentPerformanceTrend(day, ex, idx, week);
    const aggr = progressionAggressiveness(day, ex, idx, week);
    items.push({ day: day.name, exercise: ex[0], cmp, trend, aggr, tier: exerciseTier(ex), primary: (ex[6]||[])[0] || 'General' });
  }));
  const usable = items.filter(x => x.cmp.expected && x.cmp.actual);
  const ahead = usable.filter(x => x.cmp.ratio >= 1.035).sort((a,b)=>b.cmp.ratio-a.cmp.ratio).slice(0,6);
  const behind = usable.filter(x => x.cmp.ratio < 0.97).sort((a,b)=>a.cmp.ratio-b.cmp.ratio).slice(0,6);
  const aggressive = usable.filter(x => x.aggr.label === 'Aggressive').slice(0,6);
  const conservative = usable.filter(x => x.aggr.label === 'Conservative').slice(0,6);
  const avgRatio = usable.length ? usable.reduce((a,b)=>a+b.cmp.ratio,0)/usable.length : 1;
  return { items, usable, ahead, behind, aggressive, conservative, avgRatio };
}

function getAllLogRows() {

    Object.entries(days || {}).forEach(([dayId, arr]) => {
      const day = PROGRAM.find(d => d.id === dayId);
      Object.entries(arr || {}).forEach(([idx, slot]) => {
        const ex = day?.exercises?.[idx];
        if (!ex || !slot || typeof slot !== 'object') return;
        rows.push({
          week:+week,
          dayId,
          dayName: day.name,
          exercise: ex[0],
          type: ex[1],
          sets: parseSets(ex[2]),
          primary: ex[6] || [],
          todayLoad: Number(slot?.todayLoad || 0),

}

    completion: weekCompletion(w),

    effective: effectiveWeekType(w).type,
    prs: recentPRCount(w, 1)

  const current = snapshots[snapshots.length - 1];
  const prev = snapshots[snapshots.length - 2] || current;
  const avgFatigue = snapshots.reduce((a,s)=>a+s.fatigue.total,0) / Math.max(1,snapshots.length);
  const avgCompletion = snapshots.reduce((a,s)=>a+s.completion,0) / Math.max(1,snapshots.length);
  const risingFatigue = current.fatigue.total - prev.fatigue.total;
  const lowSleepStreak = snapshots.filter(s => Number(s.recovery.sleep || currentMeasure(s.week)?.sleep || 0) && Number(s.recovery.sleep || currentMeasure(s.week)?.sleep || 0) < 6.6).length;

function inferExerciseClass(ex) {
  const name = (ex[0] || '').toLowerCase();
  const type = ex[1] || 'compound';
  if (type === 'isolation') return 'Isolation';
  if (/machine|supported|cable row|pulldown|prayer/.test(name)) return 'Stable compound';
  if (/squat|deadlift|barbell|row|pull-up|hip thrust|press|rdl/.test(name)) return 'Free-weight / high-skill compound';
  return type === 'compound' ? 'Compound' : 'Accessory';
}
function historicalLoadForExercise(dayId, exIndex, uptoWeek=state.week-1) {
  let best = null;
  for (let w = Math.max(1, uptoWeek); w >= 1; w--) {
    const slot = state.logs?.[w]?.[dayId]?.[exIndex];
    const raw = Number(slot?.todayLoad || slot?.startLoad || 0);
    if (isFinite(raw) && raw > 0) {
      best = { week:w, load:raw, done:!!slot?.done };
      break;
    }
  }
  return best;
}
function startLoadDecision(day, ex, exIndex, week=state.week) {
  const slot = getLogSlot(week, day.id, exIndex);
  const manual = Number(slot.startLoad || 0);
  const today = Number(slot.todayLoad || 0);
  const hist = historicalLoadForExercise(day.id, exIndex, week-1);
  const sourceLoad = manual || hist?.load || today || 0;
  const prescribed = sourceLoad ? prescribeLoad(sourceLoad, ex[1], state.phase, effectiveWeekType(week).type) : '';
  const wk = effectiveWeekType(week).type;
  const rules = {
    normal:'Use the closest conservative load that should hit the first work set at the listed RIR. Keep 1 small plate in reserve if uncertain.',
    refeed:'Start from your recent successful load, then only bias upward if bar speed and control are clearly better after warm-ups.',
    deload:'Use ~85–90% of your normal week entry load and keep every rep crisp. The goal is recovery, not testing.',
    'refeed+deload':'Use deload loading with slightly better fuel availability. Treat it as recovery-quality work, not a push week.'
  };
  const exClass = inferExerciseClass(ex);
  const classRule = exClass === 'Isolation'
    ? 'For isolations, choose the lowest load that lets you fully control the target muscle through the full range.'
    : exClass === 'Stable compound'
    ? 'For stable compounds, you can start slightly closer to working load because balance cost is lower.'
    : 'For free-weight/high-skill compounds, build through 3–5 ramp-up sets before fixing the first work-set load.';
  return {
    source: manual ? 'Current week manual start load' : hist ? `Historical load from week ${hist.week}` : today ? 'Current week today load' : 'No historical load yet',
    sourceLoad,
    prescribed,
    weekRule: rules[wk] || rules.normal,
    classRule,
    wk,
    exClass
  };
}

function switchScreen(name) {
  state.screen = name;
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".navBtn").forEach(b => b.classList.toggle("active", b.dataset.screen === name));
  $("screen-" + name).classList.add("active");
  save(true);
}
function exportState() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "gymos_v8_6_state.json";
  a.click();
  URL.revokeObjectURL(a.href);
}

document.querySelectorAll(".navBtn").forEach(btn => btn.onclick = () => switchScreen(btn.dataset.screen));
$("themeBtn").onclick = () => applyTheme(document.body.dataset.theme === "light" ? "dark" : "light");
load();
applyTheme(storageGet(THEME_KEY) || "dark");
state.phase = phaseFromWeek(state.week);
render();
</script>
</body>
</html>
